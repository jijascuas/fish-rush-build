name: Build Android APK & AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Web Assets
        shell: powershell
        run: |
          npm run build
          if (-not (Test-Path www/index.html)) { throw "index.html missing in www!" }
          ls www

      - name: Capacitor Sync
        shell: powershell
        run: |
          npm install
          if (-not (Test-Path android)) { npx cap add android }
          npx cap sync android --verbose

      - name: Build Android APK (Debug)
        shell: powershell
        run: |
          cd android
          ./gradlew assembleDebug -x lint -x test --console=plain

      - name: Build Android App Bundle (Release)
        shell: powershell
        run: |
          cd android
          ./gradlew bundleRelease -x lint -x test --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FishRush-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB (For Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: FishRush-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab


